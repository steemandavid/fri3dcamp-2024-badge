# ESPHome config for the Fri3d Camp 2024 Badge ("Badge 2024", board codename "fox")
# ESP32-S3-WROOM-1, N16R8V (16 MB flash, 8 MB OPI PSRAM).
# Pin map from ../../pinout.md (cross-checked against Fri3dCamp/badge_2024_arduino).
#
# First flash is over USB (/dev/ttyACM0, native USB-Serial/JTAG). After that, OTA over Wi-Fi.
# Fully reversible: restore backups/fri3d-badge-2024_full-flash_2026-07-02.bin to return to camp firmware.

substitutions:
  name: fri3d-badge
  friendly_name: "Fri3d Badge 2024"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.6.0
  name_add_mac_suffix: false
  on_boot:
    - priority: 200
      then:
        - light.turn_on: badge_leds
        - delay: 300ms
        - light.turn_off: badge_leds

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: arduino

# Logs go to the native USB-Serial/JTAG → visible on /dev/ttyACM0
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  baud_rate: 115200

# --- Connectivity -----------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback hotspot if the configured Wi-Fi is unreachable (lets HA/phone adopt it)
  ap:
    ssid: "${friendly_name} Setup"
    password: ""

captive_portal: {}

improv_serial:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# --- HA data for the energy dashboard (HA → badge) --------------------------
# Pulls live states from Home Assistant into ESPHome so the display lambda can
# render them. internal:true = used only on-device, not re-exposed as entities.
time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: homeassistant
    entity_id: sensor.skoda_enyaq_laadstatus
    id: ha_enyaq_status
    internal: true

# --- I2C (IMU) + SPI (display + SD) ----------------------------------------
i2c:
  sda: 9
  scl: 18
  frequency: 400kHz
  scan: true

spi:
  mosi_pin: 6
  clk_pin: 7
  miso_pin: 8

# --- IMU: Würth WSEN-ISDS == ST LSM6DS silicon, I2C 0x6B (SAO tied high) ----
# ESPHome's unified 'lsm6ds' motion driver accepts WHO_AM_I 0x69/0x6A at runtime,
# so it recognizes the chip without blocking boot even if the ID label differs.
motion:
  - platform: lsm6ds
    id: imu
    address: 0x6B
    accelerometer_range: "4G"
    accelerometer_odr: "104HZ"
    gyroscope_range: "500DPS"
    gyroscope_odr: "104HZ"
    update_interval: 500ms

sensor:
  # --- IMU accel/gyro via the motion platform ---
  - platform: motion
    motion_id: imu
    type: acceleration_x
    name: "Accel X"
  - platform: motion
    motion_id: imu
    type: acceleration_y
    name: "Accel Y"
  - platform: motion
    motion_id: imu
    type: acceleration_z
    name: "Accel Z"
  - platform: motion
    motion_id: imu
    type: gyroscope_x
    name: "Gyro X"
  - platform: motion
    motion_id: imu
    type: gyroscope_y
    name: "Gyro Y"
  - platform: motion
    motion_id: imu
    type: gyroscope_z
    name: "Gyro Z"
  - platform: lsm6ds
    lsm6ds_id: imu
    type: temperature
    name: "IMU Temperature"

  # --- Analog joystick (GPIO1=X/ADC1_CH0, GPIO3=Y/ADC1_CH2) ---
  - platform: adc
    pin: 1
    attenuation: 12db
    name: "Joystick X"
    update_interval: 250ms
    filters:
      - sliding_window_moving_average:
          window_size: 4
          send_every: 2
  - platform: adc
    pin: 3
    attenuation: 12db
    name: "Joystick Y"
    update_interval: 250ms
    filters:
      - sliding_window_moving_average:
          window_size: 4
          send_every: 2

  # --- Battery monitor (GPIO13 = ADC2_CH2 on the S3, shared with SAO "IO13") ---
  # NB: ADC2 is shared with Wi-Fi — reads may fail while connected. Divider = 2.0,
  # 3.15V=0%..4.15V=100% (from Retro-Go targets/fri3d-2024/config.h).
  - platform: adc
    id: batt_raw
    pin: 13
    attenuation: 12db
    name: "Battery raw"
    update_interval: 5s
  - platform: template
    name: "Battery voltage"
    id: batt_voltage
    unit_of_measurement: "V"
    update_interval: 5s
    lambda: return id(batt_raw).state * 2.0;
    accuracy_decimals: 2
  - platform: template
    name: "Battery level"
    unit_of_measurement: "%"
    device_class: battery
    update_interval: 5s
    lambda: |-
      float v = id(batt_raw).state * 2.0;
      if (isnan(v)) return {};
      float pct = (v - 3.15) / (4.15 - 3.15) * 100.0;
      if (pct < 0.0) pct = 0.0;
      if (pct > 100.0) pct = 100.0;
      return pct;
    accuracy_decimals: 0

  # --- Energy dashboard: imported from Home Assistant ---
  - platform: homeassistant
    entity_id: sensor.marstek_1_battery_soc
    id: ha_marstek_1_soc
    internal: true
  - platform: homeassistant
    entity_id: sensor.marstek_2_battery_soc
    id: ha_marstek_2_soc
    internal: true
  - platform: homeassistant
    entity_id: sensor.marstek_venus_3_battery_soc
    id: ha_marstek_3_soc
    internal: true
  - platform: homeassistant
    entity_id: sensor.skoda_enyaq_accupercentage
    id: ha_enyaq_soc
    internal: true
  - platform: homeassistant
    entity_id: sensor.skoda_enyaq_actieradius
    id: ha_enyaq_range
    internal: true
  - platform: homeassistant
    entity_id: sensor.skoda_enyaq_laadvermogen
    id: ha_enyaq_charge_kw
    internal: true

# --- Buttons (active-low, internal pull-up) ---------------------------------
# START=GPIO0 is also BOOT: pressing it during reset enters download mode (intended).
# Note: this badge's MENU button is electrically flaky — may read intermittently.
binary_sensor:
  - platform: gpio
    pin: { number: 39, inverted: true, mode: { input: true, pullup: true } }
    name: "Button A"
  - platform: gpio
    pin: { number: 40, inverted: true, mode: { input: true, pullup: true } }
    name: "Button B"
  - platform: gpio
    pin: { number: 38, inverted: true, mode: { input: true, pullup: true } }
    name: "Button X"
  - platform: gpio
    pin: { number: 41, inverted: true, mode: { input: true, pullup: true } }
    name: "Button Y"
  - platform: gpio
    pin: { number: 45, inverted: true, mode: { input: true, pullup: true } }
    name: "Button MENU"
  - platform: gpio
    pin: { number: 0, inverted: true, mode: { input: true, pullup: true } }
    name: "Button START"

# --- 5× WS2812 NeoPixel string on GPIO12 (esp32_rmt_led_strip) --------------
# Uses the new RMT driver — compatible with remote_receiver. (neopixelbus's
# legacy RMT driver clashes with the IR receiver's new RMT driver at compile.)
light:
  - platform: esp32_rmt_led_strip
    id: badge_leds
    pin: 12
    num_leds: 5
    rgb_order: GRB
    chipset: WS2812
    use_psram: false
    name: "Badge LEDs"
    effects:
      - addressable_rainbow:
      - pulse:
      - strobe:

# --- Buzzer on GPIO46 (ledc PWM tone output) -------------------------------
output:
  - platform: ledc
    pin: 46
    id: buzzer_out
    frequency: 2000Hz

rtttl:
  output: buzzer_out

# --- IR receiver on GPIO11 --------------------------------------------------
remote_receiver:
  pin:
    number: 11
    inverted: true
    mode: { input: true }
  dump: all

# --- Display: GC9307 (≈ ST7789), 296×240, BGR, no inversion, 80 MHz ---------
# Params mined from Fri3d's variants/fri3d_2024_esp32s3/Fri3dBadge_pins.h
# (TFT_WIDTH=296, HEIGHT=240, OFFSET=0, INVERSION_OFF, RGB_ORDER=BGR, 80 MHz).
# Uses ESPHome's mipi_spi 'ST7789V' model — the Fri3d code drives this panel as
# a plain ST7789 (no GC9307-specific init), so the model's init is compatible.
font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 24
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

display:
  - platform: mipi_spi
    model: CUSTOM
    dimensions:
      width: 296
      height: 240
    color_order: BGR
    invert_colors: false
    cs_pin: 5
    dc_pin: 4
    reset_pin: 48
    data_rate: 40MHz
    update_interval: 5s
    # Ground truth (Retro-Go targets/fri3d-2024/config.h): MADCTL = MV|BGR = 0x28,
    # 296x240, 40 MHz, ILI9341-style init. swap_xy (MV) + BGR, no mirrors.
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false
    # ILI9341-style init (GC9307 accepts it) — verbatim from Retro-Go fri3d-2024/config.h.
    # ESPHome auto-adds SLPOUT/COLMOD/MADCTL(0x28)/INVOFF/DISPON around this.
    init_sequence:
      - [0xCF, 0x00, 0xC3, 0x30]
      - [0xED, 0x64, 0x03, 0x12, 0x81]
      - [0xE8, 0x85, 0x00, 0x78]
      - [0xCB, 0x39, 0x2C, 0x00, 0x34, 0x02]
      - [0xF7, 0x20]
      - [0xEA, 0x00, 0x00]
      - [0xC0, 0x1B]
      - [0xC1, 0x12]
      - [0xC5, 0x32, 0x3C]
      - [0xC7, 0x91]
      - [0xB1, 0x00, 0x10]
      - [0xB6, 0x0A, 0xA2]
      - [0xF6, 0x01, 0x30]
      - [0xF2, 0x00]
      - [0xE0, 0xD0, 0x00, 0x05, 0x0E, 0x15, 0x0D, 0x37, 0x43, 0x47, 0x09, 0x15, 0x12, 0x16, 0x19]
      - [0xE1, 0xD0, 0x00, 0x05, 0x0D, 0x0C, 0x06, 0x2D, 0x44, 0x40, 0x0E, 0x1C, 0x18, 0x16, 0x19]
    lambda: |-
      static const Color AMBER(255, 193, 7);
      static const Color GREY(150, 150, 150);
      static const Color WHITE(255, 255, 255);
      char buf[56], v1[16], v2[16], v3[16], ves[16], ver[20], vkw[20];

      // format a numeric HA state as fmt, or "--" if not yet received
      auto val = [](float v, bool ok, char *out, const char *fmt) {
        if (ok && !isnan(v)) snprintf(out, 16, fmt, v); else snprintf(out, 16, "--");
      };
      val(id(ha_marstek_1_soc).state, id(ha_marstek_1_soc).has_state(), v1, "%.0f%%");
      val(id(ha_marstek_2_soc).state, id(ha_marstek_2_soc).has_state(), v2, "%.0f%%");
      val(id(ha_marstek_3_soc).state, id(ha_marstek_3_soc).has_state(), v3, "%.0f%%");
      val(id(ha_enyaq_soc).state,    id(ha_enyaq_soc).has_state(),    ves, "%.0f%%");
      val(id(ha_enyaq_range).state,  id(ha_enyaq_range).has_state(),  ver, "%.0fkm");
      val(id(ha_enyaq_charge_kw).state, id(ha_enyaq_charge_kw).has_state(), vkw, "%.1fkW");

      it.print(4, 2, id(font_title), AMBER, "Energie");
      it.horizontal_line(0, 32, 296, GREY);

      it.print(4, 40, id(font_small), GREY, "Marstek batterijen");
      snprintf(buf, sizeof(buf), "1 %s   2 %s   3 %s", v1, v2, v3);
      it.print(4, 58, id(font_small), WHITE, buf);

      it.print(4, 84, id(font_small), GREY, "Skoda Enyaq");
      snprintf(buf, sizeof(buf), "accu %s   %s", ves, ver);
      it.print(4, 102, id(font_small), WHITE, buf);
      snprintf(buf, sizeof(buf), "laden %s   %s", vkw,
               id(ha_enyaq_status).has_state() ? id(ha_enyaq_status).state.c_str() : "--");
      it.print(4, 120, id(font_small), WHITE, buf);

      if (id(ha_time).now().is_valid()) {
        it.strftime(4, 168, id(font_title), WHITE, "%H:%M", id(ha_time).now());
        it.strftime(4, 206, id(font_small), GREY, "%a %d %b", id(ha_time).now());
      }
